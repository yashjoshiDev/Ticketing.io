
networks:
  ticketing-net:
    driver: bridge

services:
  # ── Infrastructure ──────────────────────────────────────────────────────────
  mongo:
    image: mongo:7
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db
    networks:
      - ticketing-net
    restart: unless-stopped

  nats:
    image: nats:latest
    ports:
      - '4222:4222'   # Client port
      - '8222:8222'   # HTTP Management port
    networks:
      - ticketing-net
    restart: unless-stopped

  # ── Microservices ───────────────────────────────────────────────────────────
  auth:
    image: ghcr.io/yashjoshidev/ticketing-auth:latest
    build:
      context: ./auth
      dockerfile: Dockerfile
    env_file: .env
    depends_on:
      - mongo
    networks:
      - ticketing-net
    restart: unless-stopped

  tickets:
    image: ghcr.io/yashjoshidev/ticketing-tickets:latest
    build:
      context: ./tickets
      dockerfile: Dockerfile
    env_file: .env
    depends_on:
      - mongo
      - nats
    networks:
      - ticketing-net
    restart: unless-stopped

  orders:
    image: ghcr.io/yashjoshidev/ticketing-orders:latest
    build:
      context: ./orders
      dockerfile: Dockerfile
    env_file: .env
    depends_on:
      - mongo
      - nats
      - tickets
    networks:
      - ticketing-net
    restart: unless-stopped

  # ── API Gateway ─────────────────────────────────────────────────────────────
  api-gateway:
    image: ghcr.io/yashjoshidev/ticketing-api-gateway:latest
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
    env_file: .env
    ports:
      - '8000:8000'
    depends_on:
      - auth
      - tickets
      - orders
    networks:
      - ticketing-net
    restart: unless-stopped

volumes:
  mongo_data:
