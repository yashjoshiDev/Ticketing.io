
networks:
  ticketing-net:
    driver: bridge

services:
  # ── Infrastructure ──────────────────────────────────────────────────────────
  postgres:
    image: postgres:17
    environment:
      POSTGRES_USER: myuser
      POSTGRES_PASSWORD: mypassword
      POSTGRES_DB: auth_db
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - ticketing-net
    restart: unless-stopped

  mongo:
    image: mongo:7
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db
    networks:
      - ticketing-net
    restart: unless-stopped

  nats:
    image: nats:latest
    ports:
      - '4222:4222'   # Client port
      - '8222:8222'   # HTTP Management port
    networks:
      - ticketing-net
    restart: unless-stopped

  # ── Microservices ───────────────────────────────────────────────────────────
  auth:
    build:
      context: ./auth
      dockerfile: Dockerfile
    env_file: .env
    depends_on:
      - mongo
    networks:
      - ticketing-net
    restart: unless-stopped

  tickets:
    build:
      context: ./tickets
      dockerfile: Dockerfile
    env_file: .env
    depends_on:
      - mongo
      - nats
    networks:
      - ticketing-net
    restart: unless-stopped

  orders:
    build:
      context: ./orders
      dockerfile: Dockerfile
    env_file: .env
    depends_on:
      - mongo
      - nats
      - tickets
    networks:
      - ticketing-net
    restart: unless-stopped

  # ── API Gateway ─────────────────────────────────────────────────────────────
  api-gateway:
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
    env_file: .env
    ports:
      - '8000:8000'
    depends_on:
      - auth
      - tickets
      - orders
    networks:
      - ticketing-net
    restart: unless-stopped

  # ── Frontend ────────────────────────────────────────────────────────────────
  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    ports:
      - '3000:3000'
    depends_on:
      - api-gateway
    networks:
      - ticketing-net
    restart: unless-stopped

volumes:
  postgres_data:
  mongo_data:
